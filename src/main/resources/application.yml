spring:
  datasource:
    # 直接读取 Railway 里的环境变量（你已经配置好了！）
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Railway 必须允许所有来源访问，否则前端/设备连不上
  web:
    cors:
      allowed-origins: "*"
      allowed-methods: "*"
      allowed-headers: "*"

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
      - https://your-project.vercel.app

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Railway 会自动分配端口，不能写死 8080
server:
  port: ${PORT:8080}
